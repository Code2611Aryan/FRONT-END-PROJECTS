<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="hero">
      <div class="landing">
        <div class="navbar">
          <div class="left">
            <img src="./imagess/netflix.svg" alt="Netflix" />
          </div>
          <div class="right">
            <div class="language">
              <select>
                <option>English</option>
                <option>हिन्दी</option>
              </select>
            </div>
            <div class="button">
              <a href="">Sign In</a>
            </div>
          </div>
        </div>

        <div class="herosection">
          <div class="firsthead">
            <h1>Unlimited movies,</h1>
            <h1>shows, and more</h1>
          </div>
          <div class="secondhead">
            <h3>Starts at ₹149. Cancel at any time.</h3>
          </div>
          <div class="thirdhead">
            <p>
              Ready to watch? Enter your email to create or restart your
              membership.
            </p>
          </div>

          <div class="emailbox">
            <div class="input-box">
              <input type="email" id="email" placeholder=" enter your email" />
              <label for="email">Email address</label>
            </div>

            <button class="start-btn">Get Started <span>&gt;</span></button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
